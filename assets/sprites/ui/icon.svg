<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="128" height="128" fill="url(#bg)"/>
  <!-- Outer frame -->
  <rect x="6" y="6" width="116" height="116" fill="none" stroke="#00f5d4" stroke-opacity="0.25" stroke-width="1"/>
  <!-- 3x3 grid of squares -->
  <g fill="none" stroke="#00f5d4" stroke-width="2">
    <rect x="18" y="18" width="28" height="28" opacity="0.35"/>
    <rect x="50" y="18" width="28" height="28" opacity="0.55"/>
    <rect x="82" y="18" width="28" height="28" opacity="0.35"/>
    <rect x="18" y="50" width="28" height="28" opacity="0.55"/>
    <rect x="50" y="50" width="28" height="28" opacity="0.95"/>
    <rect x="82" y="50" width="28" height="28" opacity="0.55"/>
    <rect x="18" y="82" width="28" height="28" opacity="0.35"/>
    <rect x="50" y="82" width="28" height="28" opacity="0.55" stroke="#7b2fbe"/>
    <rect x="82" y="82" width="28" height="28" opacity="0.35"/>
  </g>
  <!-- Center rune - teal core -->
  <rect x="58" y="58" width="12" height="12" fill="#00f5d4"/>
  <!-- Purple synergy cell fill -->
  <rect x="58" y="90" width="12" height="12" fill="#7b2fbe"/>
  <!-- Corner tick marks (blueprint feel) -->
  <g stroke="#00f5d4" stroke-width="1" stroke-opacity="0.5">
    <path d="M6,14 L6,6 L14,6"/>
    <path d="M114,6 L122,6 L122,14"/>
    <path d="M6,114 L6,122 L14,122"/>
    <path d="M114,122 L122,122 L122,114"/>
  </g>
</svg>
